<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050505">
<title>Editor de mapa · Capture it like a pro</title>
<style>
:root{
  --body:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --mono:'Cascadia Mono', Consolas, 'SF Mono', 'Roboto Mono', monospace;
  --ease:cubic-bezier(.22,.9,.3,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:#000;font-family:var(--body);overflow:hidden}

.app{
  --bg:#050505;
  --surface:#101010;
  --surface-2:#181818;
  --line:#262626;
  --text:#f2f2f2;
  --muted:#7e7e7e;
  --accent:#3da9ff;
  --accent-glow:rgba(61,169,255,.30);
  /* color por sección (tabs) */
  --c-estructura:#3da9ff;
  --c-elementos:#c6ff00;
  --c-camaras:#ffd60a;
  /* colores por tipo de elemento */
  --c-acceso:#c6ff00;
  --c-bano:#2dd4bf;
  --c-columna:#9a9a9a;
  --c-cam:#ffd60a;
  --c-dj:#c46bff;
  --c-bar:#3da9ff;
  --c-esc:#ff9f0a;
  --c-gen:#f2f2f2;

  position:relative;
  width:100%;max-width:430px;height:100dvh;margin:0 auto;
  background:var(--bg);color:var(--text);
  overflow:hidden;
  display:flex;flex-direction:column;
}
.app::before{
  content:'';position:absolute;inset:0;
  background-color:var(--accent);opacity:.12;
  -webkit-mask-image:radial-gradient(120% 46% at 50% -8%, #000, transparent 62%);
  mask-image:radial-gradient(120% 46% at 50% -8%, #000, transparent 62%);
  pointer-events:none;
}
@media (min-width:768px){
  body{display:flex;align-items:center;justify-content:center;min-height:100vh}
  .app{height:min(844px,94vh);border:1px solid #262626;border-radius:28px;box-shadow:0 40px 120px rgba(0,0,0,.7)}
}

/* ───────────── CABECERA ───────────── */
header{
  position:relative;z-index:2;
  padding:calc(12px + env(safe-area-inset-top)) 18px 8px;
  display:flex;align-items:center;gap:10px;
}
header h1{
  flex:1;
  font-family:var(--mono);font-size:13px;font-weight:600;
  letter-spacing:.16em;text-transform:uppercase;color:var(--text);
}
header h1::before{content:'● ';color:var(--accent);font-size:9px;vertical-align:2px}
.hd-btn{
  background:var(--surface);border:1px solid var(--line);border-radius:9px;
  color:var(--text);font-family:var(--mono);font-size:12px;letter-spacing:.06em;
  padding:7px 11px;cursor:pointer;text-decoration:none;display:inline-block;
}
.hd-btn:active{transform:scale(.96)}

.name-row{position:relative;z-index:2;padding:0 18px 8px}
.name-row input{
  width:100%;background:var(--surface);border:1px solid var(--line);border-radius:10px;
  color:var(--text);font-family:var(--mono);font-size:13px;letter-spacing:.05em;
  padding:8px 12px;outline:none;
}
.name-row input:focus{border-color:var(--accent)}
.name-row input::placeholder{color:var(--muted)}

/* ───────────── SECCIONES (tabs) ───────────── */
.tabs{
  position:relative;z-index:2;
  display:flex;gap:6px;padding:0 18px 8px;
}
.tab{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  background:var(--surface);border:1px solid var(--line);border-radius:10px;
  color:var(--muted);font-family:var(--mono);font-size:9.5px;font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;
  padding:9px 4px;cursor:pointer;
  transition:border-color .2s,color .2s,box-shadow .2s;
}
.tab svg{width:14px;height:14px;flex:none;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tab .num{
  width:14px;height:14px;border-radius:50%;border:1px solid currentColor;
  display:flex;align-items:center;justify-content:center;font-size:8px;flex:none;
}
.tab[data-tab="estructura"].is-on{color:var(--c-estructura);border-color:var(--c-estructura);box-shadow:0 0 16px rgba(61,169,255,.30)}
.tab[data-tab="elementos"].is-on{color:var(--c-elementos);border-color:var(--c-elementos);box-shadow:0 0 16px rgba(198,255,0,.30)}
.tab[data-tab="camaras"].is-on{color:var(--c-camaras);border-color:var(--c-camaras);box-shadow:0 0 16px rgba(255,214,10,.30)}

/* ───────────── LIENZO ───────────── */
/* cuadrado y centrado → proporciones reales (un cuadrado se ve cuadrado,
   el semicírculo es medio círculo de verdad). El tamaño px lo fija el JS. */
.canvas-wrap{position:relative;z-index:1;flex:1;min-height:0;padding:0 18px;display:flex;align-items:center;justify-content:center}
#canvas{
  position:relative;width:100%;height:100%;flex:none;
  background:var(--surface);
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size:11.11% 11.11%;
  border:1px solid var(--line);border-radius:14px;
  overflow:hidden;touch-action:none;
}
#floor{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
/* unión SIN costuras: capa inferior de "blobs" en color de acento (relleno+trazo)
   y, encima, los rellenos opacos exactos. Como cada capa es de un solo color, las
   piezas que se solapan se fusionan sin línea interior; solo asoma el contorno de
   acento en el perímetro exterior de la unión. */
#floor .glowg{filter:drop-shadow(0 0 7px var(--accent-glow))}
#floor .pglow{fill:var(--accent);stroke:var(--accent);stroke-width:5;vector-effect:non-scaling-stroke;stroke-linejoin:round}
/* al imantar un borde con otra pieza, ese contorno se pinta en amarillo */
#floor .pglow.snap{fill:#ffd60a;stroke:#ffd60a}
#floor .glowg.snapping{filter:drop-shadow(0 0 8px rgba(255,214,10,.55))}
/* el relleno lleva un trazo del MISMO color: así dos rellenos que se tocan se
   solapan ~1px y tapan el azul de debajo (no queda raya en la costura) */
#floor .pfl{fill:#161616;stroke:#161616;stroke-width:2.5;vector-effect:non-scaling-stroke;stroke-linejoin:round;pointer-events:auto;cursor:grab}
#floor .psel{fill:none;stroke:#fff;stroke-width:1.5;stroke-dasharray:6 5;vector-effect:non-scaling-stroke;pointer-events:none}

/* elementos colocados — tamaño libre vía --w/--h, centrados en su punto (x,y) */
.el{
  position:absolute;
  width:var(--w,30px);height:var(--h,30px);
  transform:translate(-50%,-50%);
  cursor:grab;touch-action:none;user-select:none;
  color:var(--el-c);
}
.el:active{cursor:grabbing}
.el .ic{
  position:relative;
  width:100%;height:100%;border-radius:9px;
  background:var(--surface-2);border:1.5px solid var(--el-c);
  display:flex;align-items:center;justify-content:center;
  transform:rotate(var(--rot,0deg));
  transition:transform .15s var(--ease);
}
.el .ic svg{width:60%;height:60%;max-width:22px;max-height:22px;display:block;stroke:var(--el-c);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.el .lb{
  position:absolute;top:100%;left:50%;transform:translateX(-50%);margin-top:3px;
  font-family:var(--mono);font-size:7.5px;letter-spacing:.05em;text-transform:uppercase;
  color:var(--el-c);opacity:.85;pointer-events:none;max-width:96px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.el.t-columna .ic{border-radius:50%}
.el.t-gen_circulo .ic{border-radius:50%}
.el.t-escenario .ic,.el.t-bar .ic{border-radius:6px}
/* cámara: baliza roja parpadeante para localizarla de un vistazo */
.el.t-camarografo .ic{animation:camHalo 1.4s ease-in-out infinite}
@keyframes camHalo{
  0%,100%{box-shadow:0 0 0 0 rgba(255,59,48,0)}
  50%{box-shadow:0 0 16px 5px rgba(255,59,48,.8)}
}
.el.t-camarografo .ic::after{
  content:'';position:absolute;top:-4px;right:-4px;width:9px;height:9px;border-radius:50%;
  background:#ff3b30;box-shadow:0 0 6px rgba(255,59,48,.9);
  animation:camDot 1.4s steps(2,jump-none) infinite;
}
@keyframes camDot{0%,49%{opacity:1}50%,100%{opacity:.12}}
.el.sel .ic{box-shadow:0 0 0 2px var(--bg),0 0 0 3.5px var(--el-c),0 0 16px var(--el-c)}
/* alcance de edición por sección: solo se puede tocar lo de la pestaña activa */
.app.sec-estructura .el{pointer-events:none}
.app.sec-elementos #floor .pfl{pointer-events:none}
.app.sec-elementos .el.t-camarografo{pointer-events:none}
.app.sec-camaras #floor .pfl{pointer-events:none}
.app.sec-camaras .el{pointer-events:none}
.app.sec-camaras .el.t-camarografo{pointer-events:auto}
/* mostrar/ocultar elementos (botón de la sección Estructura) */
#canvas.hide-els .el{display:none}
/* candado en elementos con posición bloqueada */
.el .lock-badge{
  position:absolute;top:-8px;right:-8px;z-index:6;
  width:16px;height:16px;border-radius:50%;
  background:#ffd60a;border:1.5px solid var(--bg);
  display:none;align-items:center;justify-content:center;
  box-shadow:0 0 7px rgba(255,214,10,.6);
}
.el .lock-badge svg{width:9px;height:9px;stroke:#1a1500;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
.el.locked .lock-badge{display:flex}
.el.dragging{opacity:.85;z-index:10}

/* fantasma al arrastrar desde la paleta */
#ghost{
  position:fixed;z-index:99;width:44px;height:44px;margin:-22px 0 0 -22px;
  pointer-events:none;display:none;opacity:.9;
}

/* aviso flotante (dentro del mapa, arriba) */
#toast{
  position:absolute;left:50%;top:14px;transform:translateX(-50%) translateY(-8px);
  background:var(--surface-2);border:1px solid var(--accent);border-radius:10px;
  color:var(--text);font-family:var(--mono);font-size:11px;letter-spacing:.08em;
  padding:9px 16px;opacity:0;pointer-events:none;z-index:30;
  transition:opacity .25s var(--ease),transform .25s var(--ease);
  white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* barra de deshacer — dentro del mapa, abajo, bien visible */
#undobar{
  position:absolute;left:50%;bottom:14px;transform:translateX(-50%) translateY(10px);
  display:flex;align-items:center;gap:12px;
  background:rgba(18,18,18,.97);border:1.5px solid var(--accent);border-radius:12px;
  padding:9px 9px 9px 16px;
  box-shadow:0 10px 30px rgba(0,0,0,.55),0 0 18px var(--accent-glow);
  opacity:0;pointer-events:none;z-index:31;
  transition:opacity .22s var(--ease),transform .22s var(--ease);
  white-space:nowrap;
}
#undobar.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
#undobar-txt{font-family:var(--mono);font-size:11.5px;letter-spacing:.04em;color:var(--text)}
#undobar-btn{
  background:var(--accent);border:none;border-radius:8px;
  color:#04121f;font-family:var(--mono);font-size:11px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;padding:8px 14px;cursor:pointer;
}
#undobar-btn:active{transform:scale(.95)}

/* ───────────── PANEL DE EDICIÓN (sección separada) ───────────── */
/* siempre presente y de altura fija → el mapa no cambia de tamaño al usarlo */
.edit-panel{
  position:relative;z-index:2;
  margin:9px 18px 0;
  display:flex;align-items:center;gap:8px;min-height:48px;
  background:var(--surface);border:1px solid var(--line);
  border-left:3px solid var(--accent);border-radius:12px;
  padding:8px 10px;
}
.ep-title{
  flex:none;max-width:120px;
  font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;color:var(--text);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.edit-panel.is-hint .ep-title{max-width:none;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:.02em;font-size:10.5px}
.ep-title:empty{display:none}
.ep-actions{display:flex;gap:5px;flex:1;justify-content:space-between}
.edit-panel button{
  background:var(--surface-2);border:1px solid var(--line);border-radius:8px;
  color:var(--text);cursor:pointer;display:none;flex:none;
  width:32px;height:32px;align-items:center;justify-content:center;padding:0;
}
.edit-panel button.on{display:flex}
.edit-panel button:active{transform:scale(.93)}
.edit-panel button svg{width:16px;height:16px;display:block;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
/* color por función para que el grupo "tenga sentido" de un vistazo */
.edit-panel .c-text{color:#3da9ff;border-color:rgba(61,169,255,.4)}
.edit-panel .c-dup{color:#c6ff00;border-color:rgba(198,255,0,.4)}
.edit-panel .c-lock{color:#7e7e7e}
.edit-panel .c-lock.is-locked{color:#ffd60a;border-color:rgba(255,214,10,.5);background:rgba(255,214,10,.1)}
.edit-panel .c-del{color:#ff3b30;border-color:rgba(255,59,48,.4)}
/* separador sutil entre grupos de acciones */
.edit-panel .sep{width:1px;height:20px;background:var(--line);flex:none;display:none}
.edit-panel .sep.on{display:block}

/* ───────────── CUERPO DE LA SECCIÓN ACTIVA ───────────── */
/* min-height fija (≥ la sección más alta) → el lienzo no cambia entre pestañas */
.tab-body{position:relative;z-index:2;padding:9px 18px 4px;min-height:178px}
.tab-pane{display:flex;flex-direction:column;gap:7px}
.tab-pane.hidden{display:none}
.pane-hint{
  font-family:var(--mono);font-size:8.5px;color:var(--muted);letter-spacing:.05em;
  text-align:center;padding-top:2px;line-height:1.5;
}

/* piezas de estructura */
.shapes{display:flex;gap:8px}
.shape-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  background:var(--surface);border:1px solid var(--line);border-radius:10px;
  padding:7px 2px 5px;cursor:pointer;color:var(--muted);
  transition:border-color .2s,color .2s;
}
.shape-btn svg{width:24px;height:24px;display:block}
.shape-btn svg .fl{fill:none;stroke:currentColor;stroke-width:7}
.shape-btn span{font-family:var(--mono);font-size:8.5px;letter-spacing:.08em;text-transform:uppercase}
.shape-btn:active{border-color:var(--c-estructura);color:var(--c-estructura)}
/* botón mostrar/ocultar todos los elementos (sección Estructura) */
.vis-toggle{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--surface);border:1px solid var(--line);border-radius:10px;
  color:var(--text);font-family:var(--mono);font-size:10px;font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;
  padding:9px 0;cursor:pointer;
  transition:color .2s,border-color .2s;
}
.vis-toggle svg{width:15px;height:15px;flex:none;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.vis-toggle:active{transform:scale(.98)}
.vis-toggle.off{color:var(--muted);border-style:dashed}

/* paleta de elementos / cámara */
.el-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.pal-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:var(--surface);border:1px solid var(--line);border-radius:11px;
  padding:8px 2px 6px;cursor:grab;touch-action:none;user-select:none;
  color:var(--pal-c);
}
.pal-item:active{cursor:grabbing}
.pal-item .ic{
  width:26px;height:26px;border-radius:8px;
  background:var(--surface-2);border:1.5px solid var(--pal-c);
  display:flex;align-items:center;justify-content:center;
}
.pal-item[data-type="columna"] .ic,
.pal-item[data-type="gen_circulo"] .ic{border-radius:50%}
.pal-item .ic svg{width:15px;height:15px;stroke:var(--pal-c);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.pal-item span{font-family:var(--mono);font-size:8px;letter-spacing:.03em;text-transform:uppercase;color:var(--pal-c)}

/* subsección "Otros" (figuras genéricas sin texto) */
.otros{display:flex;align-items:center;gap:10px;margin-top:2px;padding-top:8px;border-top:1px solid var(--line)}
.otros-lbl{flex:none;font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.otros-row{display:flex;gap:7px;flex:1}
.pal-item.icon-only{flex:none;width:46px;padding:8px 0}

/* cámara: botón ancho destacado */
.pal-item.cam-big{
  flex-direction:row;gap:12px;justify-content:center;padding:13px 2px;
}
.pal-item.cam-big .ic{width:30px;height:30px}
.pal-item.cam-big span{font-size:11px;letter-spacing:.08em}

/* ───────────── PIE ───────────── */
footer{
  position:relative;z-index:2;
  display:flex;gap:8px;
  padding:6px 18px calc(12px + env(safe-area-inset-bottom));
}
footer button{
  flex:1;background:var(--surface);border:1px solid var(--line);border-radius:11px;
  color:var(--text);font-family:var(--mono);font-size:11px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;padding:10px 0;cursor:pointer;
}
footer button:active{transform:scale(.97)}
footer #btn-save{border-color:var(--accent);color:var(--accent)}
footer #btn-clear{color:var(--muted)}

/* ───────────── PANEL MIS MAPAS ───────────── */
#maps-panel{
  position:absolute;inset:0;z-index:60;
  background:rgba(0,0,0,.6);backdrop-filter:blur(2px);
  display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity .2s var(--ease);
}
#maps-panel.open{opacity:1;pointer-events:auto}
#maps-panel .sheet{
  width:100%;max-height:70%;overflow:auto;
  background:var(--bg);border-top:1px solid var(--line);
  border-radius:18px 18px 0 0;
  padding:14px 18px calc(18px + env(safe-area-inset-bottom));
  transform:translateY(12px);transition:transform .2s var(--ease);
}
#maps-panel.open .sheet{transform:translateY(0)}
.sheet-head{
  display:flex;align-items:center;justify-content:space-between;
  font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:var(--text);
  text-transform:uppercase;padding-bottom:10px;
}
.sheet-head button{
  background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:4px 8px;
}
.map-row{
  display:flex;align-items:center;gap:10px;
  background:var(--surface);border:1px solid var(--line);border-radius:11px;
  padding:10px 12px;margin-bottom:8px;cursor:pointer;
}
.map-row.current{border-color:var(--accent)}
.map-row .mn{flex:1;min-width:0;font-family:var(--mono);font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.map-row .md{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.05em}
.map-row .mx{background:none;border:none;color:#ff3b30;font-size:13px;cursor:pointer;padding:4px 6px}
#maps-new{
  width:100%;background:var(--surface);border:1px dashed var(--line);border-radius:11px;
  color:var(--accent);font-family:var(--mono);font-size:11px;letter-spacing:.1em;
  text-transform:uppercase;padding:11px 0;cursor:pointer;margin-top:2px;
}
.maps-empty{font-family:var(--mono);font-size:10.5px;color:var(--muted);letter-spacing:.06em;padding:6px 2px 10px}
</style>
</head>
<body>
<div class="app" id="app">

  <header>
    <a class="hd-btn" href="../" title="Volver a la app">←</a>
    <h1>Editor de mapa</h1>
    <!-- TEMPORAL: recarga rápida para pruebas en el móvil (quitar al acabar) -->
    <button class="hd-btn" onclick="location.href=location.pathname+'?r='+Date.now()" title="Recargar">⟳</button>
    <button class="hd-btn" id="btn-maps">Mapas</button>
  </header>

  <div class="name-row">
    <input id="map-name" type="text" placeholder="Nombre de la sala (p. ej. Sala principal)" maxlength="40">
  </div>

  <!-- ── Tres secciones ── -->
  <div class="tabs" id="tabs">
    <button class="tab is-on" data-tab="estructura">
      <svg viewBox="0 0 24 24"><path d="M4 5h16v14H4z"/><path d="M4 11h9v8"/></svg>
      Estructura
    </button>
    <button class="tab" data-tab="elementos">
      <svg viewBox="0 0 24 24"><circle cx="7" cy="7" r="3"/><rect x="14" y="4" width="6" height="6" rx="1"/><path d="M7 14l3 6H4z"/><rect x="14" y="14" width="6" height="6" rx="1"/></svg>
      Elementos
    </button>
    <button class="tab" data-tab="camaras">
      <svg viewBox="0 0 24 24"><rect x="3" y="7" width="12" height="10" rx="2"/><path d="M15 10l6-3v10l-6-3"/></svg>
      Cámaras
    </button>
  </div>

  <div class="canvas-wrap">
    <div id="canvas">
      <svg id="floor" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
      <div id="toast"></div>
      <div id="undobar"><span id="undobar-txt"></span><button id="undobar-btn">Deshacer</button></div>
    </div>
  </div>

  <!-- panel de edición (aparece al seleccionar, sección aparte) -->
  <div class="edit-panel" id="edit-panel">
    <span class="ep-title" id="ep-title"></span>
    <div class="ep-actions">
      <button id="btn-text" class="c-text" title="Editar texto"><svg viewBox="0 0 24 24"><path d="M4 20h4L18.5 9.5a2.1 2.1 0 0 0-3-3L5 17z"/><path d="M13.5 6.5l3 3"/></svg></button>
      <button id="btn-rot" title="Rotar"><svg viewBox="0 0 24 24"><path d="M4 12a8 8 0 1 1 2.4 5.7"/><path d="M4 20v-5h5"/></svg></button>
      <button id="btn-smaller" title="Más pequeño"><svg viewBox="0 0 24 24"><path d="M21 9h-6V3"/><path d="M21 3l-6 6"/><path d="M3 15h6v6"/><path d="M3 21l6-6"/></svg></button>
      <button id="btn-bigger" title="Más grande"><svg viewBox="0 0 24 24"><path d="M15 3h6v6"/><path d="M21 3l-6 6"/><path d="M9 21H3v-6"/><path d="M3 21l6-6"/></svg></button>
      <button id="btn-wm" title="Estrechar"><svg viewBox="0 0 24 24"><path d="M12 6v12"/><path d="M6 9l3 3-3 3"/><path d="M18 9l-3 3 3 3"/></svg></button>
      <button id="btn-wp" title="Ensanchar"><svg viewBox="0 0 24 24"><path d="M3 7v10"/><path d="M21 7v10"/><path d="M8 12h8"/><path d="M10 9l-3 3 3 3"/><path d="M14 9l3 3-3 3"/></svg></button>
      <button id="btn-hm" title="Reducir alto"><svg viewBox="0 0 24 24"><path d="M6 12h12"/><path d="M9 6l3 3 3-3"/><path d="M9 18l3-3 3 3"/></svg></button>
      <button id="btn-hp" title="Aumentar alto"><svg viewBox="0 0 24 24"><path d="M7 3h10"/><path d="M7 21h10"/><path d="M12 8v8"/><path d="M9 10l3-3 3 3"/><path d="M9 14l3 3-3 3"/></svg></button>
      <button id="btn-dup" class="c-dup" title="Duplicar"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M6 15H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v1"/></svg></button>
      <button id="btn-lock" class="c-lock" title="Bloquear posición"><svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></button>
      <button id="btn-del" class="c-del" title="Quitar"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    </div>
  </div>

  <!-- cuerpo de la sección activa -->
  <div class="tab-body">
    <div class="tab-pane" data-tab="estructura" id="pane-estructura">
      <div class="shapes" id="shapes">
        <button class="shape-btn" data-kind="rect">
          <svg viewBox="0 0 100 100"><rect class="fl" x="12" y="22" width="76" height="56"/></svg>
          <span>Rect</span>
        </button>
        <button class="shape-btn" data-kind="ele">
          <svg viewBox="0 0 100 100"><path class="fl" d="M22 14 H58 V52 H86 V86 H22 Z"/></svg>
          <span>En L</span>
        </button>
        <button class="shape-btn" data-kind="te">
          <svg viewBox="0 0 100 100"><path class="fl" d="M14 16 H86 V44 H64 V86 H36 V44 H14 Z"/></svg>
          <span>En T</span>
        </button>
        <button class="shape-btn" data-kind="semi">
          <svg viewBox="0 0 100 100"><path class="fl" d="M16 70 A34 34 0 0 1 84 70 Z"/></svg>
          <span>Semi</span>
        </button>
      </div>
      <button class="vis-toggle" id="vis-toggle">
        <svg viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
        <span id="vis-toggle-lbl">Ocultar elementos</span>
      </button>
      <p class="pane-hint">Toca una forma para añadirla · arrástrala y solapa varias para componer la planta de la sala.</p>
    </div>

    <div class="tab-pane hidden" data-tab="elementos" id="pane-elementos">
      <div class="el-grid" id="pal-main"></div>
      <div class="otros">
        <span class="otros-lbl">Otros</span>
        <div class="otros-row" id="pal-otros"></div>

      <p class="pane-hint">Arrastra un elemento al plano, o tócalo para soltarlo en el centro.</p>
    </div>

    <div class="tab-pane hidden" data-tab="camaras" id="pane-camaras">
      <div id="pal-cam"></div>
      <p class="pane-hint">Coloca dónde estará el camarógrafo. Parpadea en rojo para localizarlo de un vistazo.</p>

    <button id="btn-save">Guardar</button>
    <button id="btn-export">Copiar JSON</button>

  <div id="maps-panel">
    <div class="sheet">
      <div class="sheet-head"><span>Mis mapas</span><button id="maps-close">✕</button></div>
      <div id="maps-list"></div>
      <button id="maps-new">+ Nuevo mapa</button>
    </div>
  </div>

  <div id="ghost"></div>
</div>

<script>
'use strict';
/* ══════════════════════════════════════════════════════════════
   EDITOR DE MAPA — módulo independiente (v0.6)
   Sin dependencias. Pensado para integrarse luego en index.html.

   Tres secciones (tabs): ESTRUCTURA (planta) · ELEMENTOS · CÁMARAS.

   Modelo: { id, name,
             pieces:[{id,kind,x,y,w,h,rot}],          ← planta componible
             elements:[{id,type,x,y,w,h,rot,text?}] } ← objetos encima
   Piezas: x,y centro y w,h en % (0–100) del lienzo; rot múltiplo de 90.
   Elementos: x,y centro en % del lienzo; w,h tamaño en px (redimensionable);
   rot en pasos de 45°; text solo en genéricos (estrella/círculo/cuadrado).

   localStorage:
     cip_mapa_editor_v1 → borrador de trabajo (autosave)
     cip_mapas_v1       → biblioteca "Mis mapas" (botón Guardar)
   ══════════════════════════════════════════════════════════════ */

const DRAFT_KEY = 'cip_mapa_editor_v1';
const LIB_KEY   = 'cip_mapas_v1';

/* piezas de planta — path unitario (0..1), tamaño % por defecto */
const PIECES_DEF = {
  rect:{ label:'Rect',  path:'M0 0 H1 V1 H0 Z',                         w:60, h:50 },
  ele: { label:'En L',  path:'M0 0 H0.62 V0.5 H1 V1 H0 Z',              w:65, h:60 },
  te:  { label:'En T',  path:'M0 0 H1 V0.38 H0.66 V1 H0.34 V0.38 H0 Z', w:65, h:60 },
  /* semicírculo "verdadero": alto = mitad del ancho, así su diámetro encaja con
     el lado de un rect/cuadrado del mismo ancho sin dejar esquinas */
  semi:{ label:'Semi',  path:'M0 1 A0.5 1 0 0 1 1 1 Z',                 w:60, h:30 }
};

/* tipos de elemento — w/h = tamaño por defecto en px (redimensionable) */
const TYPES = {
  acceso:     { label:'Acceso',    color:'var(--c-acceso)', w:30, h:30,
    icon:'<svg viewBox="0 0 24 24"><path d="M16 4h5v16h-5"/><path d="M3 12h13"/><path d="M6 9l-3 3 3 3"/><path d="M13 9l3 3-3 3"/></svg>' },
  banos:      { label:'Baños',     color:'var(--c-bano)',   w:30, h:30,
    icon:'<svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="2"/><path d="M12 8v6"/><path d="M8 12h8"/><path d="M9.5 21l2.5-5 2.5 5"/></svg>' },
  columna:    { label:'Columna',   color:'var(--c-columna)', w:30, h:30,
    icon:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="6"/></svg>' },
  dj:         { label:'DJ',        color:'var(--c-dj)',     w:30, h:30,
    icon:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="1.6"/></svg>' },
  bar:        { label:'Bar',       color:'var(--c-bar)',    w:62, h:26,
    icon:'<svg viewBox="0 0 24 24"><path d="M4 5h16l-8 9z"/><path d="M12 14v6"/><path d="M8 20h8"/></svg>' },
  escenario:  { label:'Escenario', color:'var(--c-esc)',    w:62, h:26,
    icon:'<svg viewBox="0 0 24 24"><rect x="3" y="10" width="18" height="9" rx="1.5"/><path d="M3 10l9-5 9 5"/></svg>' },
  gen_estrella:{ label:'Estrella', color:'var(--c-gen)', editable:true, w:30, h:30,
    icon:'<svg viewBox="0 0 24 24"><path d="M12 3l2.6 5.6 6 .7-4.5 4.1 1.2 5.9-5.3-3-5.3 3 1.2-5.9L3.4 9.3l6-.7Z"/></svg>' },
  gen_circulo:{ label:'Círculo',   color:'var(--c-gen)', editable:true, w:30, h:30,
    icon:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="7.5"/></svg>' },
  gen_cuadrado:{ label:'Cuadrado', color:'var(--c-gen)', editable:true, w:30, h:30,
    icon:'<svg viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>' },
  camarografo:{ label:'Cámara',    color:'var(--c-cam)',    w:30, h:30,
    icon:'<svg viewBox="0 0 24 24"><rect x="3" y="7" width="12" height="10" rx="2"/><path d="M15 10l6-3v10l-6-3"/></svg>' }
};
const ELEM_MIN = 18, ELEM_MAX = 150, ELEM_STEP = 6;   // límites de tamaño de elemento (px)

/* reparto de la paleta por sección */
const GROUP = {
  main:  ['acceso','banos','columna','dj','bar','escenario'],
  otros: ['gen_estrella','gen_circulo','gen_cuadrado'],
  cam:   ['camarografo']
};

function freshMap(){
  return { id:'m' + Date.now(), name:'',
           pieces:[{ id:1, kind:'rect', x:50, y:50, w:80, h:85, rot:0 }],
           elements:[] };
}

let state = freshMap();
let selEl = null;        // id de elemento seleccionado
let selPiece = null;     // id de pieza seleccionada
let idSeq = 2;

const $ = s => document.querySelector(s);
const app = document.getElementById('app');
const canvas = $('#canvas'), floor = $('#floor'), ghost = $('#ghost');

let currentTab = 'estructura';   // sección activa (estructura | elementos | camaras)
let elsHidden = false;           // ocultar elementos mientras se diseña la estructura
const SECTION_COLOR = { estructura:'#3da9ff', elementos:'#c6ff00', camaras:'#ffd60a' };
const SECTION_HINT  = {
  estructura:'Toca una forma de la planta para editarla',
  elementos:'Toca un elemento para editarlo',
  camaras:'Toca una cámara para editarla'
};
function applyVisibility(){
  canvas.classList.toggle('hide-els', elsHidden && currentTab === 'estructura');
}
/* fija la altura del cuerpo a la de la sección más alta → el lienzo no cambia
   de tamaño al alternar entre Estructura / Elementos / Cámaras */
function lockTabBodyHeight(){
  const body = $('.tab-body');
  let max = 0;
  document.querySelectorAll('.tab-pane').forEach(p => {
    const hidden = p.classList.contains('hidden');
    if(hidden) p.classList.remove('hidden');
    max = Math.max(max, p.offsetHeight);
    if(hidden) p.classList.add('hidden');
  });
  const pad = 13;   // padding vertical del .tab-body (box-sizing: border-box)
  body.style.minHeight = (max + pad) + 'px';
}

/* ───────── persistencia ───────── */
function loadDraft(){
  try{
    const raw = localStorage.getItem(DRAFT_KEY);
    if(!raw) return;
    let d = JSON.parse(raw);
    if(!d) return;
    /* migración desde v0.1 (forma única + salida/entrada separadas) */
    if(d.shape){
      const kindMap = { rect:'rect', cuadrado:'rect', ele:'ele', te:'te', ovalo:'semi' };
      d = { id:'m' + Date.now(), name:d.name || '',
            pieces:[{ id:1, kind:kindMap[d.shape] || 'rect', x:50, y:50, w:80, h:85, rot:0 }],
            elements:(d.elements || []).map(e => ({
              ...e, type:(e.type === 'salida' || e.type === 'entrada') ? 'acceso' : e.type
            })).filter(e => TYPES[e.type]) };
    }
    if(Array.isArray(d.pieces) && Array.isArray(d.elements)){
      state = d;
      syncSeq();
      saveDraft();          // persiste posibles migraciones de formato
    }
  }catch(e){}
}
function syncSeq(){
  idSeq = 1 + Math.max(0,
    ...state.pieces.map(p => p.id),
    ...state.elements.map(e => e.id));
}
function saveDraft(){ localStorage.setItem(DRAFT_KEY, JSON.stringify(state)); }
function loadLib(){
  try{ return JSON.parse(localStorage.getItem(LIB_KEY)) || []; }catch(e){ return []; }
}
function saveToLibrary(){
  const lib = loadLib();
  const snap = JSON.parse(JSON.stringify(state));
  snap.updated = Date.now();
  const i = lib.findIndex(m => m.id === state.id);
  if(i >= 0) lib[i] = snap; else lib.push(snap);
  localStorage.setItem(LIB_KEY, JSON.stringify(lib));
  saveDraft();
  toast('Mapa guardado en Mis mapas');
}

/* ───────── render de la planta (piezas) ───────── */
function pieceTransform(p){
  return 'translate(' + p.x + ' ' + p.y + ') rotate(' + (p.rot||0) +
         ') scale(' + p.w + ' ' + p.h + ') translate(-0.5 -0.5)';
}
function renderFloor(){
  let glow = '', fills = '', sel = '';
  state.pieces.forEach(p => {
    const d = PIECES_DEF[p.kind].path, tr = pieceTransform(p);
    glow  += '<path class="pglow" d="' + d + '" transform="' + tr + '"/>';
    fills += '<path class="pfl" d="' + d + '" transform="' + tr + '" data-id="' + p.id + '"/>';
    if(p.id === selPiece)
      sel += '<path class="psel" d="' + d + '" transform="' + tr + '"/>';
  });
  floor.innerHTML = '<g class="glowg">' + glow + '</g><g>' + fills + '</g><g>' + sel + '</g>';
  floor.querySelectorAll('.pfl').forEach(path =>
    path.addEventListener('pointerdown', ev => startDragPiece(ev, +path.dataset.id, path)));
}

/* ───────── render de elementos ───────── */
function renderElements(){
  canvas.querySelectorAll('.el').forEach(n => n.remove());
  state.elements.forEach(e => canvas.appendChild(makeNode(e)));
}
function makeNode(e){
  const t = TYPES[e.type];
  const n = document.createElement('div');
  n.className = 'el t-' + e.type + (e.id === selEl ? ' sel' : '') + (e.locked ? ' locked' : '');
  n.dataset.id = e.id;
  n.style.setProperty('--el-c', t.color);
  n.style.setProperty('--rot', (e.rot||0) + 'deg');
  n.style.setProperty('--w', (e.w || t.w || 30) + 'px');
  n.style.setProperty('--h', (e.h || t.h || 30) + 'px');
  n.style.left = e.x + '%';
  n.style.top  = e.y + '%';
  /* genéricos: sin texto hasta que el usuario lo escriba; el resto, su etiqueta */
  const labelText = t.editable ? (e.text || '') : (e.text || t.label);
  n.innerHTML = '<div class="ic">' + t.icon + '</div>' +
                (labelText ? '<div class="lb">' + escapeHtml(labelText) + '</div>' : '') +
                '<span class="lock-badge"><svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></span>';
  n.addEventListener('pointerdown', ev => startDragEl(ev, e.id, n));
  return n;
}
function escapeHtml(s){
  return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

/* ───────── panel de edición contextual ───────── */
const ALL_BTNS = ['btn-text','btn-rot','btn-smaller','btn-bigger','btn-wm','btn-wp','btn-hm','btn-hp','btn-dup','btn-lock','btn-del'];
function renderEditPanel(){
  const panel = $('#edit-panel'), title = $('#ep-title');
  panel.style.borderLeftColor = SECTION_COLOR[currentTab] || 'var(--accent)';
  const show = ids => ALL_BTNS.forEach(id => $('#'+id).classList.toggle('on', ids.includes(id)));
  const e = state.elements.find(x => x.id === selEl);
  const p = state.pieces.find(x => x.id === selPiece);
  /* refleja el estado del candado en su botón */
  const setLock = locked => {
    const b = $('#btn-lock');
    b.classList.toggle('is-locked', !!locked);
    b.title = locked ? 'Desbloquear posición' : 'Bloquear posición';
    b.querySelector('svg').innerHTML = locked
      ? '<rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>'      // cerrado
      : '<rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 7.5-1.5"/>';   // abierto
  };
  if(e){
    const t = TYPES[e.type];
    panel.classList.remove('is-hint');
    title.textContent = '';        // sin etiqueta al seleccionar: deja sitio a los botones
    setLock(e.locked);
    /* elementos: escala uniforme (más/menos) + duplicar + bloquear */
    const ids = ['btn-rot','btn-smaller','btn-bigger','btn-dup','btn-lock','btn-del'];
    if(t.editable) ids.unshift('btn-text');
    show(ids);
  }else if(p){
    panel.classList.remove('is-hint');
    title.textContent = '';
    setLock(p.locked);
    /* piezas: ancho/alto por eje (semicírculo solo ancho) + duplicar + bloquear */
    const ids = p.kind === 'semi'
      ? ['btn-rot','btn-wm','btn-wp','btn-dup','btn-lock','btn-del']
      : ['btn-rot','btn-wm','btn-wp','btn-hm','btn-hp','btn-dup','btn-lock','btn-del'];
    show(ids);
  }else{
    panel.classList.add('is-hint');
    title.textContent = SECTION_HINT[currentTab] || 'Toca un elemento para editarlo';
    show([]);
  }
}
function select(elId, pieceId){
  selEl = elId; selPiece = pieceId;
  canvas.querySelectorAll('.el').forEach(n =>
    n.classList.toggle('sel', +n.dataset.id === elId));
  renderFloor();          // repinta el contorno de selección de pieza
  renderEditPanel();
}

/* ───────── acciones del panel ───────── */
$('#btn-rot').addEventListener('click', () => {
  const e = state.elements.find(x => x.id === selEl);
  const p = state.pieces.find(x => x.id === selPiece);
  if(e){
    e.rot = ((e.rot||0) + 45) % 360;
    const n = canvas.querySelector('.el[data-id="' + e.id + '"]');
    if(n) n.style.setProperty('--rot', e.rot + 'deg');
  }else if(p){
    p.rot = ((p.rot||0) + 90) % 360;
    renderFloor();
  }
  saveDraft();
});
const clampN = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
/* redimensión de PIEZAS por eje (sw/sh = sentido en cada eje) */
function resizeSel(sw, sh){
  const p = state.pieces.find(x => x.id === selPiece);
  if(!p) return;
  /* semicírculo = medio círculo verdadero: solo se ajusta el diámetro (w);
     el alto se mantiene a la mitad para que encaje con el lado de un rect */
  if(p.kind === 'semi'){
    if(sw){ p.w = clampN(p.w + sw * 5, 15, 100); p.h = p.w / 2; }
    renderFloor();
    saveDraft();
    return;
  }
  /* si la pieza está girada 90/270°, lo que el usuario ve como ancho es h */
  const swapped = (p.rot||0) % 180 !== 0;
  const kw = swapped ? 'h' : 'w', kh = swapped ? 'w' : 'h';
  /* paso de 5 sobre rejilla común (defaults múltiplos de 5) → cualquier lado de
     una pieza puede igualarse al de otra (diámetro del semicírculo = lado del rect) */
  if(sw) p[kw] = clampN(p[kw] + sw * 5, 15, 100);
  if(sh) p[kh] = clampN(p[kh] + sh * 5, 15, 100);
  renderFloor();
  saveDraft();
}
$('#btn-wm').addEventListener('click', () => resizeSel(-1, 0));
$('#btn-wp').addEventListener('click', () => resizeSel( 1, 0));
$('#btn-hm').addEventListener('click', () => resizeSel(0, -1));
$('#btn-hp').addEventListener('click', () => resizeSel(0,  1));

/* ELEMENTOS: escala uniforme (más grande / más pequeño) */
function scaleEl(dir){
  const e = state.elements.find(x => x.id === selEl);
  if(!e) return;
  const t = TYPES[e.type];
  const f = dir > 0 ? 1.18 : 1 / 1.18;
  e.w = Math.round(clampN((e.w || t.w || 30) * f, ELEM_MIN, ELEM_MAX));
  e.h = Math.round(clampN((e.h || t.h || 30) * f, ELEM_MIN, ELEM_MAX));
  const n = canvas.querySelector('.el[data-id="' + e.id + '"]');
  if(n){ n.style.setProperty('--w', e.w + 'px'); n.style.setProperty('--h', e.h + 'px'); }
  saveDraft();
}
$('#btn-bigger').addEventListener('click', () => scaleEl(1));
$('#btn-smaller').addEventListener('click', () => scaleEl(-1));

/* duplicar el elemento o la pieza seleccionada (desplazado un poco) */
$('#btn-dup').addEventListener('click', () => {
  if(selEl != null){
    const e = state.elements.find(x => x.id === selEl);
    if(!e) return;
    const c = JSON.parse(JSON.stringify(e));
    c.id = idSeq++; c.locked = false;
    c.x = clampN(e.x + 6, 4, 96); c.y = clampN(e.y + 6, 6, 94);
    state.elements.push(c);
    canvas.appendChild(makeNode(c));
    select(c.id, null);
  }else if(selPiece != null){
    const p = state.pieces.find(x => x.id === selPiece);
    if(!p) return;
    const c = JSON.parse(JSON.stringify(p));
    c.id = idSeq++; c.locked = false;
    c.x = clampN(p.x + 6, 2, 98); c.y = clampN(p.y + 6, 2, 98);
    state.pieces.push(c);
    select(null, c.id);
  }
  saveDraft();
});

/* bloquear / desbloquear la posición */
$('#btn-lock').addEventListener('click', () => {
  const obj = state.elements.find(x => x.id === selEl) ||
              state.pieces.find(x => x.id === selPiece);
  if(!obj) return;
  obj.locked = !obj.locked;
  if(selEl != null) renderElements(); else renderFloor();
  renderEditPanel();
  saveDraft();
});
$('#btn-text').addEventListener('click', () => {
  const e = state.elements.find(x => x.id === selEl);
  if(!e || !TYPES[e.type].editable) return;
  const v = prompt('Texto del elemento:', e.text || '');
  if(v === null) return;
  e.text = v.trim().slice(0, 24);
  renderElements();
  renderEditPanel();
  saveDraft();
});
$('#btn-del').addEventListener('click', () => {
  if(selEl != null) deleteElementById(selEl);
  else if(selPiece != null) deletePieceById(selPiece);
});

/* ───────── borrar con deshacer ───────── */
let lastDeleted = null, undoTimer = null;
function deleteElementById(id){
  const idx = state.elements.findIndex(e => e.id === id);
  if(idx < 0) return;
  lastDeleted = { kind:'element', data:state.elements[idx], index:idx };
  state.elements.splice(idx, 1);
  if(selEl === id) select(null, null);
  renderElements();
  saveDraft();
  showUndo('Elemento eliminado');
}
function deletePieceById(id){
  const idx = state.pieces.findIndex(p => p.id === id);
  if(idx < 0) return;
  lastDeleted = { kind:'piece', data:state.pieces[idx], index:idx };
  state.pieces.splice(idx, 1);
  if(selPiece === id) select(null, null);
  renderFloor();
  saveDraft();
  showUndo('Pieza eliminada');
}
function showUndo(msg){
  $('#undobar-txt').textContent = msg;
  $('#undobar').classList.add('show');
  clearTimeout(undoTimer);
  undoTimer = setTimeout(() => { $('#undobar').classList.remove('show'); lastDeleted = null; }, 5000);
}
$('#undobar-btn').addEventListener('click', () => {
  if(!lastDeleted) return;
  const { kind, data, index } = lastDeleted;
  if(kind === 'element'){
    state.elements.splice(Math.min(index, state.elements.length), 0, data);
    renderElements();
    select(data.id, null);
  }else{
    state.pieces.splice(Math.min(index, state.pieces.length), 0, data);
    renderFloor();
    select(null, data.id);
  }
  lastDeleted = null;
  clearTimeout(undoTimer);
  $('#undobar').classList.remove('show');
  saveDraft();
});
canvas.addEventListener('pointerdown', ev => {
  if(ev.target === canvas || ev.target === floor) select(null, null);
});

/* caja contenedora (en %) de una pieza, según su rotación */
function pieceBBox(p){
  const sw = (p.rot||0) % 180 !== 0;
  const hw = (sw ? p.h : p.w) / 2, hh = (sw ? p.w : p.h) / 2;
  return { hw, hh, l:p.x-hw, r:p.x+hw, t:p.y-hh, b:p.y+hh };
}
const SNAP_T = 3;   // umbral de imantado en % de unidades del lienzo
/* imanta los bordes de p a los de las demás piezas; devuelve el índice imantado o -1 */
function snapPiece(p){
  let A = pieceBBox(p), hit = -1;
  state.pieces.forEach((q, qi) => {
    if(q.id === p.id) return;
    const B = pieceBBox(q);
    const yOv = Math.min(A.b, B.b) - Math.max(A.t, B.t);
    const xOv = Math.min(A.r, B.r) - Math.max(A.l, B.l);
    if(yOv > 5){   // bordes verticales adyacentes/alineados
      const pairs = [[A.r,B.l],[A.l,B.r],[A.l,B.l],[A.r,B.r]];
      for(const [a, b] of pairs) if(Math.abs(a-b) < SNAP_T){ p.x += (b-a); A = pieceBBox(p); hit = qi; break; }
    }
    if(xOv > 5){   // bordes horizontales adyacentes/alineados
      const pairs = [[A.b,B.t],[A.t,B.b],[A.t,B.t],[A.b,B.b]];
      for(const [a, b] of pairs) if(Math.abs(a-b) < SNAP_T){ p.y += (b-a); A = pieceBBox(p); hit = qi; break; }
    }
  });
  return hit;
}

/* ───────── drag: piezas de planta ───────── */
function startDragPiece(ev, id, path){
  ev.preventDefault();
  ev.stopPropagation();
  const p = state.pieces.find(x => x.id === id);
  if(!p) return;
  /* seleccionar SIN reconstruir el SVG: el path debe seguir vivo para el drag */
  selEl = null; selPiece = id;
  canvas.querySelectorAll('.el').forEach(n => n.classList.remove('sel'));
  const selGroup = floor.children[2];
  selGroup.innerHTML = '<path class="psel" d="' + PIECES_DEF[p.kind].path +
                       '" transform="' + pieceTransform(p) + '"/>';
  renderEditPanel();
  if(p.locked) return;     // posición bloqueada: solo selecciona, no arrastra
  try{ path.setPointerCapture(ev.pointerId); }catch(e){}
  const r0 = canvas.getBoundingClientRect();
  const ox = p.x - (ev.clientX - r0.left) / r0.width  * 100;
  const oy = p.y - (ev.clientY - r0.top)  / r0.height * 100;
  const idx = Array.prototype.indexOf.call(path.parentNode.children, path);
  const glowGroup = floor.children[0];
  const strokePath = glowGroup.children[idx];
  let moved = false;
  const onMove = mv => {
    moved = true;
    const r = canvas.getBoundingClientRect();
    let nx = ox + (mv.clientX - r.left) / r.width  * 100;
    let ny = oy + (mv.clientY - r.top)  / r.height * 100;
    p.x = +nx.toFixed(2); p.y = +ny.toFixed(2);
    const hit = snapPiece(p);                 // imantar bordes
    const bb = pieceBBox(p);                   // y mantener la pieza dentro del lienzo
    p.x = +clampN(p.x, bb.hw, 100-bb.hw).toFixed(2);
    p.y = +clampN(p.y, bb.hh, 100-bb.hh).toFixed(2);
    /* mover solo los transforms es más fluido que reconstruir el SVG */
    const tr = pieceTransform(p);
    path.setAttribute('transform', tr);
    if(strokePath) strokePath.setAttribute('transform', tr);
    const ps = selGroup.firstChild;
    if(ps) ps.setAttribute('transform', tr);
    /* feedback en amarillo cuando un borde queda imantado */
    glowGroup.querySelectorAll('.pglow.snap').forEach(n => n.classList.remove('snap'));
    glowGroup.classList.toggle('snapping', hit >= 0);
    if(hit >= 0){
      if(strokePath) strokePath.classList.add('snap');
      const tgt = glowGroup.children[hit];
      if(tgt) tgt.classList.add('snap');
    }
  };
  const onUp = () => {
    path.removeEventListener('pointermove', onMove);
    path.removeEventListener('pointerup', onUp);
    path.removeEventListener('pointercancel', onUp);
    if(moved){ renderFloor(); saveDraft(); }
  };
  path.addEventListener('pointermove', onMove);
  path.addEventListener('pointerup', onUp);
  path.addEventListener('pointercancel', onUp);
}

/* ───────── drag: elementos colocados ───────── */
function startDragEl(ev, id, node){
  ev.preventDefault();
  ev.stopPropagation();
  select(id, null);
  const e = state.elements.find(x => x.id === id);
  if(!e) return;
  if(e.locked) return;     // posición bloqueada: solo selecciona, no arrastra
  try{ node.setPointerCapture(ev.pointerId); }catch(err){}
  node.classList.add('dragging');
  let moved = false;
  const onMove = mv => {
    moved = true;
    const p = toPct(mv.clientX, mv.clientY, e);
    e.x = p.x; e.y = p.y;
    node.style.left = e.x + '%';
    node.style.top  = e.y + '%';
  };
  const onUp = () => {
    node.classList.remove('dragging');
    node.removeEventListener('pointermove', onMove);
    node.removeEventListener('pointerup', onUp);
    node.removeEventListener('pointercancel', onUp);
    if(moved) saveDraft();
  };
  node.addEventListener('pointermove', onMove);
  node.addEventListener('pointerup', onUp);
  node.addEventListener('pointercancel', onUp);
}
/* posición en % manteniendo el elemento ENTERO dentro del lienzo (margen = medio tamaño) */
function toPct(cx, cy, e){
  const r = canvas.getBoundingClientRect();
  const t = e ? TYPES[e.type] : null;
  const mx = e ? ((e.w || t.w || 30) / 2 / r.width)  * 100 : 4;
  const my = e ? ((e.h || t.h || 30) / 2 / r.height) * 100 : 6;
  const x = clampN((cx - r.left) / r.width  * 100, mx, 100 - mx);
  const y = clampN((cy - r.top)  / r.height * 100, my, 100 - my);
  return { x:+x.toFixed(2), y:+y.toFixed(2) };
}

/* ───────── secciones (tabs) ───────── */
$('#tabs').addEventListener('click', ev => {
  const t = ev.target.closest('.tab');
  if(!t) return;
  currentTab = t.dataset.tab;
  document.querySelectorAll('.tab').forEach(x => x.classList.toggle('is-on', x === t));
  document.querySelectorAll('.tab-pane').forEach(p =>
    p.classList.toggle('hidden', p.dataset.tab !== currentTab));
  app.classList.remove('sec-estructura','sec-elementos','sec-camaras');
  app.classList.add('sec-' + currentTab);
  select(null, null);      // la selección no cruza de una sección a otra
  applyVisibility();       // los elementos solo se ocultan dentro de Estructura
});
$('#vis-toggle').addEventListener('click', () => {
  elsHidden = !elsHidden;
  $('#vis-toggle-lbl').textContent = elsHidden ? 'Mostrar elementos' : 'Ocultar elementos';
  $('#vis-toggle').classList.toggle('off', elsHidden);
  applyVisibility();
});

/* ───────── añadir piezas (estructura) ───────── */
$('#shapes').addEventListener('click', ev => {
  const b = ev.target.closest('.shape-btn');
  if(!b) return;
  const def = PIECES_DEF[b.dataset.kind];
  const p = { id:idSeq++, kind:b.dataset.kind, x:50, y:50, w:def.w, h:def.h, rot:0 };
  state.pieces.push(p);
  select(null, p.id);
  saveDraft();
});

/* ───────── paletas de elementos / cámara ───────── */
function buildPalItem(type, opts){
  opts = opts || {};
  const t = TYPES[type];
  const b = document.createElement('div');
  b.className = 'pal-item' + (opts.iconOnly ? ' icon-only' : '') + (opts.big ? ' cam-big' : '');
  b.dataset.type = type;
  b.title = t.label;
  b.style.setProperty('--pal-c', t.color);
  b.innerHTML = '<div class="ic">' + t.icon + '</div>' +
                (opts.iconOnly ? '' : '<span>' + t.label + '</span>');
  b.addEventListener('pointerdown', ev => startDragPal(ev, type, b));
  return b;
}
GROUP.main.forEach(tp => $('#pal-main').appendChild(buildPalItem(tp)));
GROUP.otros.forEach(tp => $('#pal-otros').appendChild(buildPalItem(tp, { iconOnly:true })));
GROUP.cam.forEach(tp => $('#pal-cam').appendChild(buildPalItem(tp, { big:true })));

function startDragPal(ev, type, item){
  ev.preventDefault();
  try{ item.setPointerCapture(ev.pointerId); }catch(e){}
  let moved = false;
  ghost.innerHTML = '<div class="el t-' + type + '" style="--el-c:' + TYPES[type].color +
    ';--w:' + (TYPES[type].w || 30) + 'px;--h:' + (TYPES[type].h || 30) +
    'px;position:static;margin:0;transform:none"><div class="ic">' + TYPES[type].icon + '</div></div>';
  const onMove = mv => {
    if(!moved && Math.hypot(mv.clientX - ev.clientX, mv.clientY - ev.clientY) < 6) return;
    moved = true;
    ghost.style.display = 'block';
    ghost.style.left = mv.clientX + 'px';
    ghost.style.top  = mv.clientY + 'px';
  };
  const onUp = up => {
    ghost.style.display = 'none';
    item.removeEventListener('pointermove', onMove);
    item.removeEventListener('pointerup', onUp);
    item.removeEventListener('pointercancel', onUp);
    const r = canvas.getBoundingClientRect();
    if(moved && up.clientX >= r.left && up.clientX <= r.right &&
               up.clientY >= r.top  && up.clientY <= r.bottom){
      addElement(type, toPct(up.clientX, up.clientY));        // soltado sobre el plano
    }else if(!moved){
      addElement(type, { x:50, y:50 });                       // toque simple → al centro
    }
  };
  item.addEventListener('pointermove', onMove);
  item.addEventListener('pointerup', onUp);
  item.addEventListener('pointercancel', onUp);
}

function addElement(type, pos){
  const t = TYPES[type];
  const e = { id:idSeq++, type, x:pos.x, y:pos.y, rot:0, w:t.w || 30, h:t.h || 30 };
  if(t.editable) e.text = '';
  /* mantener el elemento entero dentro del lienzo */
  const r = canvas.getBoundingClientRect();
  const mx = (e.w / 2 / r.width) * 100, my = (e.h / 2 / r.height) * 100;
  e.x = +clampN(e.x, mx, 100 - mx).toFixed(2);
  e.y = +clampN(e.y, my, 100 - my).toFixed(2);
  state.elements.push(e);
  canvas.appendChild(makeNode(e));
  select(e.id, null);
  saveDraft();
}

/* ───────── nombre y pie ───────── */
$('#map-name').addEventListener('input', ev => {
  state.name = ev.target.value;
  saveDraft();
});
$('#btn-save').addEventListener('click', saveToLibrary);
$('#btn-clear').addEventListener('click', () => {
  if(confirm('¿Vaciar el plano? Se quitan piezas y elementos.')){
    state.pieces = [];
    state.elements = [];
    select(null, null);
    renderElements();
    saveDraft();
  }
});
$('#btn-export').addEventListener('click', async () => {
  const json = JSON.stringify(state, null, 2);
  try{
    await navigator.clipboard.writeText(json);
    toast('JSON copiado al portapapeles');
  }catch(e){
    prompt('Copia el JSON del mapa:', json);
  }
});

/* ───────── panel Mis mapas ───────── */
const panel = $('#maps-panel');
function renderMapsList(){
  const lib = loadLib();
  const list = $('#maps-list');
  if(!lib.length){
    list.innerHTML = '<div class="maps-empty">Aún no hay mapas guardados. Usa «Guardar» para añadir el actual.</div>';
    return;
  }
  list.innerHTML = '';
  lib.slice().sort((a, b) => (b.updated||0) - (a.updated||0)).forEach(m => {
    const row = document.createElement('div');
    row.className = 'map-row' + (m.id === state.id ? ' current' : '');
    const date = m.updated ? new Date(m.updated).toLocaleDateString('es-ES', {day:'numeric', month:'short'}) : '';
    row.innerHTML =
      '<span class="mn">' + escapeHtml(m.name || 'Sin nombre') + '</span>' +
      '<span class="md">' + m.elements.length + ' elem · ' + date + '</span>' +
      '<button class="mx" title="Borrar">✕</button>';
    row.addEventListener('click', ev => {
      if(ev.target.closest('.mx')){
        if(confirm('¿Borrar «' + (m.name || 'Sin nombre') + '» de Mis mapas?')){
          localStorage.setItem(LIB_KEY, JSON.stringify(loadLib().filter(x => x.id !== m.id)));
          renderMapsList();
        }
        return;
      }
      state = JSON.parse(JSON.stringify(m));
      syncSeq();
      select(null, null);
      $('#map-name').value = state.name || '';
      renderElements();
      saveDraft();
      panel.classList.remove('open');
      toast('Mapa cargado');
    });
    list.appendChild(row);
  });
}
$('#btn-maps').addEventListener('click', () => {
  renderMapsList();
  panel.classList.add('open');
});
$('#maps-close').addEventListener('click', () => panel.classList.remove('open'));
panel.addEventListener('click', ev => {
  if(ev.target === panel) panel.classList.remove('open');
});
$('#maps-new').addEventListener('click', () => {
  if(!confirm('¿Empezar un mapa nuevo? Lo que no esté guardado se pierde.')) return;
  state = freshMap();
  idSeq = 2;
  select(null, null);
  $('#map-name').value = '';
  renderElements();
  saveDraft();
  panel.classList.remove('open');
});

/* ───────── toast ───────── */
let toastTimer = null;
function toast(msg){
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

/* lienzo cuadrado (lado = menor del área disponible) → proporciones reales */
function sizeCanvas(){
  const wrap = canvas.parentElement, cs = getComputedStyle(wrap);
  const availW = wrap.clientWidth  - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
  const availH = wrap.clientHeight - parseFloat(cs.paddingTop)  - parseFloat(cs.paddingBottom);
  const s = Math.max(40, Math.min(availW, availH));
  canvas.style.width = s + 'px';
  canvas.style.height = s + 'px';
}
window.addEventListener('resize', () => { lockTabBodyHeight(); sizeCanvas(); });

/* ───────── arranque ───────── */
loadDraft();
$('#map-name').value = state.name || '';
app.classList.add('sec-' + currentTab);   // sección inicial: estructura
applyVisibility();
lockTabBodyHeight();
sizeCanvas();
renderFloor();
renderElements();
renderEditPanel();
</script>
